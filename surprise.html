<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body class="fade-in">

<section class="message">
  <h2>💌 For You</h2>
  <p id="typing"></p>
</section>

<section class="gallery">
  <h2>Our Memories 📸</h2>
  <div class="photos">
    <img src="images/photo1.jpg">
    <img src="images/photo2.jpg">
    <img src="images/photo3.jpg">
  </div>
</section>

<section class="love">
  <h2>Why I Love You ❤️</h2>
  <div class="cards">
    <div>Your smile 😊</div>
    <div>Your voice 🎶</div>
    <div>Your kindness 💕</div>
    <div>Everything about you 💖</div>
  </div>
</section>

<section class="final">
  <h1>Forever Yours ❤️</h1>
  <button onclick="showFinal()">Open My Heart 🎁</button>
</section>

<div id="finalMessage" class="final-message">
  <h1>I LOVE YOU FOREVER ❤️</h1>
</div>

<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
